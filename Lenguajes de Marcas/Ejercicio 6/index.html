<!DOCTYPE html>
<html lang="es" style="height: 100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estilos</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      header {
        background-color: aqua;
        height: 10%;
      }
      nav {
        background-color: blue;
        color: white;
        height: 10%;
      }
      aside {
        background-color: aquamarine;
        width: 20%;
      }
      main {
        background-color: rgb(0, 153, 255);
        height: 60%;
        display: flex;
      }
      main section {
        margin: 20px;
        height: 60%;
        padding: 20px;
        width: 100%;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-start;
      }
      article{
        background-color: rgb(36, 236, 70);
        padding: 20px;
        height: 20%;
      }
      footer {
        width: 100%;
        height: 10%;
        background-color: #08ddb9;
        float: left;
      }
      body {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <p>CABEZERA</p>
    </header>
    <nav>menu navegacion</nav>
    <main>
      <aside>PUBLICIDAD</aside>
      <section>
        <article>Contenido 1</article>
        <article>Contenido 2</article>
      </section>
    </main>
    <footer>Pie de pagina</footer>
  </body>
</html>
