<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estilos</title>
    <style>
      header {
        background-color: aqua;
        width: 100%;
        height: 100px;
      }
      nav {
        background-color: blue;
        color: white;
        height: 50px;
      }
      aside {
        background-color: aquamarine;
        height: 200px;
        width: 20%;
        float: left;
      }
      main {
        background-color: rgb(0, 153, 255);
        height: 200px;
        width: 80%;
        float: left;
      }
      main article {
        background-color: #9ccf59;
      }
      footer {
        width: 100%;
        height: 200px;
        background-color: #08ddb9;
        float: left;
      }
    </style>
  </head>
  <body>
    <header>
      <p>CABEZERA</p>
    </header>
    <nav>menu navegacion</nav>
    <aside>PUBLICIDAD</aside>
    <main>
      <article>Contenido 1</article>
      <article>Contenido 2</article>
    </main>
    <footer>Pie de pagina</footer>
  </body>
</html>
