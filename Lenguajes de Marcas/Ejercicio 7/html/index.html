<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Futbol</title>
    <style>
      main {
        background-image: url(../img/campo.png);
        height: 1000px;
        background-repeat: no-repeat;
        position: relative;
      }
      .portero {
        position: absolute;
        top: 240px;
      }
      .jug1 {
        position: absolute;
        left: 40px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="portero">
        <img src="../img/equipo2.png" width="40px" height="40px" />
      </div>
      <!-- Defensas --->
      <div style="position: absolute; top: 100px; left: 80px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 200px; left: 80px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 300px; left: 80px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 400px; left: 80px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <!-- Medios -->
      <div style="position: absolute; top: 100px; left: 300px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 200px; left: 300px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 300px; left: 300px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 400px; left: 300px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <!-- Delanteros-->
      <div style="position: absolute; top: 200px; left: 650px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
      <div style="position: absolute; top: 260px; left: 650px">
        <img src="../img/equipo1.png" width="40px" height="40px" />
      </div>
    </main>
  </body>
</html>
